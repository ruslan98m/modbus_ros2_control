---
# Configuration file for Modbus device (e.g. PLC). Used by xacro via device_config / slave_config.

# Optional: response timeout in seconds (float). If set, modbus requests will wait at most this long
# for a reply from the device. If not set or 0, libmodbus default is used.
response_timeout_sec: 1.0

# Optional: support for multi-register/coil read-write (default: true). If false, device only supports
# single register/coil per request (FC03/FC04/FC06 single; FC01/FC02/FC05 single).
read_multiple_registers: true
write_multiple_registers: true
read_multiple_coils: true
write_multiple_coils: true
# Optional: written once at startup. Only coil and holding_register.
init_registers:
  - {type: holding_register, address: 100, data_type: uint16, value: 1}
  - {type: coil, address: 0, data_type: bool, value: true}
# registers: type (input_register/holding_register/coil/discrete_input), address (start),
#   state_interface OR command_interface: interface name (exactly one per register).
#   input_register and discrete_input are read-only -> state_interface only.
#   holding_register and coil -> state_interface or command_interface.
#   Optional: factor and offset — value_ros = raw * factor + offset (read); raw = (value_ros - offset) / factor (write).
#   Multi-register types use address = first register:
#   int16/uint16/bool = 1 reg; int32/uint32/float32 = 2 regs; int64/uint64/float64 = 4 regs.
registers:
  - {type: input_register, address: 0, state_interface: temperature, data_type: int16,
    factor: 0.1}
  - {type: input_register, address: 1, state_interface: pressure, data_type: float32}
  - {type: input_register, address: 3, state_interface: flow, data_type: float64}
  - {type: input_register, address: 7, state_interface: counter, data_type: int32}
  - {type: holding_register, address: 0, command_interface: setpoint, data_type: uint16,
    offset: 100}
  - {type: coil, address: 0, command_interface: relay, data_type: bool}
