---
# Format check: clang-format and pre-commit
# See CONTRIBUTING.md for local setup.
name: Format
on:
  workflow_dispatch:
  pull_request:
    branches: [main, jazzy]
    paths:
      - '**.cpp'
      - '**.hpp'
      - '**.c'
      - '**.h'
      - .clang-format
      - .pre-commit-config.yaml
jobs:
  format:
    name: clang-format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y -qq clang-format-14
      - name: Check formatting (C/C++)
        run: |
          find . -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.c' -o -name '*.h' \) ! -path './.git/*' -print0 \
            | xargs -0 -r clang-format-14 --style=file -i
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Clang-format would change files. Run: clang-format-14 --style=file -i <files>"
            git diff
            exit 1
          fi
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pre-commit and system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y -qq clang-format-14
          pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --hook-stage manual || true
