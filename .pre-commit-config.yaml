# Pre-commit hooks for modbus_ros2_control
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files
# See https://pre-commit.com

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-xml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python: PEP 8 style formatting
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
        types: [python]

  # YAML: format and fix (no Node.js required)
  - repo: https://github.com/lyz-code/yamlfix
    rev: 1.19.1
    hooks:
      - id: yamlfix
        exclude: ^\.(pre-commit-config\.yaml|clang-format)$

  # C/C++: format with clang-format (runs on all .cpp, .hpp, .c, .h; fixes in place)
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: clang-format-14 --style=file -i
        language: system
        files: '\.(cpp|hpp|c|h)$'
