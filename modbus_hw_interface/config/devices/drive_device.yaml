---
# Configuration file for Modbus device (e.g. drive). Used by xacro via device_config / slave_config.
# Optional: multi-register read/write (default: true). Adjacent registers are read/written in one request.
# read_multiple_registers: true
# write_multiple_registers: true
# read_multiple_coils: true
# write_multiple_coils: true
registers:
  - {name: speed, type: holding_register, address: 0, interface: state, data_type: uint16}
  - {name: command, type: holding_register, address: 1, interface: command, data_type: int16}
